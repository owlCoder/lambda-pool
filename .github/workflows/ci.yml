name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  integration:
    name: integration (real MySQL + Postgres)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test
        ports:
          - 3399:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptest"
          --health-interval=3s --health-timeout=5s --health-retries=20
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5499:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test"
          --health-interval=3s --health-timeout=5s --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:integration
        env:
          RUN_DB_TESTS: "1"
          MYSQL_TEST_URL: mysql://root:test@127.0.0.1:3399/test
          PG_TEST_URL: postgres://postgres:test@127.0.0.1:5499/test
